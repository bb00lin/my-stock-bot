name: worklog_to_confluence (Auto Sync)

on:
  workflow_dispatch: # 允許在 GitHub 網頁上手動按鈕觸發
  schedule:
    # 台灣時間 (CST) 週一至週五 08:00 = UTC 時間 00:00
    # 分 時 日 月 週
    - cron: '0 0 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 下載程式碼與設定檔 (包含 settings_daily.json)
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 設定 Python 執行環境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. 安裝必要套件 (移除了 customtkinter，只保留網路與解析套件)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dotenv lxml

    # 4. 執行 Headless 自動化腳本
    - name: Run Confluence Script
      id: run_script
      env:
        # 將 GitHub Secrets 對應到腳本所需的環境變數
        CONF_URL: ${{ secrets.CONF_URL }}
        CONF_USER: ${{ secrets.CONF_USER }}
        CONF_PASS: ${{ secrets.CONF_PASS }}
        
        # 團隊成員信箱 (如果在 Secrets 沒有設定，腳本會自動改用人名去 Jira 搜尋)
        SHANNON_EMAIL: ${{ secrets.SHANNON_EMAIL }}
        SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
        VIC_EMAIL: ${{ secrets.VIC_EMAIL }}
        SF_EMAIL: ${{ secrets.SF_EMAIL }}
      
      # 執行你指定的 Python 檔名
      run: |
        python daily_worklog_to_confluence.py 2>&1 | tee output.txt

    # 5. 發送成功信件
    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465   
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Done]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: file://output.txt

    # 6. 發送失敗信件
    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Fail]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: |
          Confluence 自動日誌寫入執行失敗。
          
          請檢查 GitHub Actions Log 了解詳情。
