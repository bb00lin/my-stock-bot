name: worklog_to_confluence (Auto Sync)

on:
  workflow_dispatch: # 允許在 GitHub 網頁上手動按鈕觸發
  schedule:
    
    # 台灣時間 (CST) 週一至週五 03:00 = UTC 時間前一天的 19:00
    # 分 時 日 月 週 (0-4 代表 UTC 週日至週四，剛好對應台灣的週一至週五凌晨)
    - cron: '0 19 * * 0-4'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 提早適應 Node.js 24 環境，消除版本過時警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. 下載程式碼與設定檔 (已升級至 v4)
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 設定 Python 執行環境 (已升級至 v5)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. 安裝必要套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dotenv lxml

    # 4. 執行 Headless 自動化腳本
    - name: Run Confluence Script
      id: run_script
      env:
        # 將 GitHub Secrets 對應到腳本所需的環境變數
        CONF_URL: ${{ secrets.CONF_URL }}
        CONF_USER: ${{ secrets.CONF_USER }}
        CONF_PASS: ${{ secrets.CONF_PASS }}
        
        # 團隊成員信箱
        SHANNON_EMAIL: ${{ secrets.SHANNON_EMAIL }}
        SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
        VIC_EMAIL: ${{ secrets.VIC_EMAIL }}
        SF_EMAIL: ${{ secrets.SF_EMAIL }}
      
      run: |
        python daily_worklog_to_confluence.py 2>&1 | tee output.txt

    # 5. 發送成功信件
    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465   
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Done]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: file://output.txt

    # 6. 發送失敗信件
    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Fail]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: |
          Confluence 自動日誌寫入執行失敗。
          
          請檢查 GitHub Actions Log 了解詳情。
