name: Confluence Weekly2 Report

on:
  workflow_dispatch: # 允許手動按鈕觸發
  schedule:
    # 台灣時間週一 16:00 = UTC 時間週一 08:00
    - cron: '0 8 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 下載程式碼
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 設定 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. 安裝套件 (從 requirements.txt 讀取，確保裝好 bs4)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 執行自動化腳本 (防假成功機制)
    - name: Run Confluence Script
      id: run_script
      env:
        CONF_URL: ${{ secrets.CONF_URL }}
        CONF_USER: ${{ secrets.CONF_USER }}
        CONF_PASS: ${{ secrets.CONF_PASS }}
      run: |
        python confluence_api2.py > output.txt 2>&1 || { cat output.txt; exit 1; }
        cat output.txt

    # 5. 發送成功信件 [Done]
    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Done]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: file://output.txt

    # 6. 發送失敗信件 [Fail] (附帶 Error Log)
    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Fail]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: file://output.txt
