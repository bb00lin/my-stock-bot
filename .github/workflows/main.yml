name: DailyStockBot

on:
  schedule:
    - cron: '10 08 * * 1-5' # 台北時間 16:10 執行 (UTC 08:10)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180 
    steps:
      - name: 1. 檢出代碼
        uses: actions/checkout@v4 # 🚀 升級至 v4

      - name: 2. 設定 Python
        uses: actions/setup-python@v5 # 🚀 升級至 v5
        with:
          python-version: '3.10'
          cache: 'pip' # ⚡ [全新優化] 開啟快取，加速後續套件安裝速度

      - name: 3. 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          # 🚀 [修正] 補上新版 Push 腳本不可或缺的 google-genai 官方 SDK
          pip install yfinance pandas requests FinMind tqdm gspread oauth2client numpy google-genai

      # [已移除] 4. 建立 Google 金鑰檔案 (不需要了，且比較安全)

      - name: 5. 執行股票分析 (Bot)
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: python DailyStockBot.py

      #- name: 6. 執行 AI 戰略體檢與推播 (Push)
