name: DailyStockPush

on:
  schedule:
    - cron: '30 09 * * 1-5' # 台北時間 17:30 (UTC 09:30)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run_job:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 🚀 升級至 v4，支援最新 Node.js 環境

      - name: Set up Python
        uses: actions/setup-python@v5 # 🚀 升級至 v5
        with:
          python-version: '3.10'
          cache: 'pip' # ⚡ [全新優化] 開啟 pip 快取，下次執行時免重新下載相同套件，大幅縮短執行時間

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U tqdm requests pandas yfinance FinMind gspread oauth2client google-genai

      - name: Run DailyStockPush
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: python DailyStockPush.py
