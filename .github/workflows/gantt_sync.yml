name: Jira Gantt to Confluence Sync

on:
  schedule:
    # 台灣時間凌晨 00:05 執行 (對應 UTC 16:05)
    - cron: "5 16 * * *"
  workflow_dispatch: # 允許手動點擊執行測試

jobs:
  update-gantt:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝相依套件
        run: |
          pip install requests beautifulsoup4 python-dotenv

      - name: 🚀 執行推進任務
        env:
          # 直接連動您圖中的 Secrets 名稱
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_PASS: ${{ secrets.CONF_PASS }}
        run: python github_gantt_sync.py
