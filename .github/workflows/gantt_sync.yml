name: Jira Gantt to Confluence Sync

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  update-gantt:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🚀 執行甘特圖推進腳本
        env:
          # 這裡直接對應你截圖中的現有 Secrets
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_PASS: ${{ secrets.CONF_PASS }}
          # SPACE_KEY 可以直接寫在這邊，若未來想改，也可以改為讀取 variables
          SPACE_KEY: "team_AIoTHW"
        run: python github_gantt_sync.py
