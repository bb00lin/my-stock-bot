name: Jira Gantt to Confluence Sync

on:
  schedule:
    # 每天 UTC 時間 16:00 執行 (剛好是台灣時間的凌晨 00:00)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  update-gantt:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: 🚀 執行甘特圖推進腳本
        env:
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_PASS: ${{ secrets.CONF_PASS }}
          # 👇 這裡已經為你修正為網址上正確的 Space Key (沒有底線)
          SPACE_KEY: "teamAIoTHW"
        # 👇 確保這裡的檔名跟你 GitHub 根目錄的 Python 檔名完全一致
        run: python github_gantt_sync.py
