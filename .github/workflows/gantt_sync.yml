name: Jira Gantt to Confluence Sync

on:
  schedule:
    # 這裡設定每日執行時間 (UTC 時間)
    # 台灣時間凌晨 01:00 = UTC 前一天 17:00
    - cron: '0 17 * * *'
  workflow_dispatch:
    # 允許手動點擊按鈕立即觸發執行

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼 (Checkout code)
        uses: actions/checkout@v3

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl python-dotenv

      - name: 🚀 執行甘特圖自動同步腳本
        env:
          # 這裡讀取 GitHub Secrets 中儲存的金鑰
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_PASS: ${{ secrets.CONF_PASS }}
        run: python github_gantt_sync.py
