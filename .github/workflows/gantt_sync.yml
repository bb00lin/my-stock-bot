name: Jira Gantt to Confluence Sync

on:
  schedule:
    # 台灣時間凌晨 00:05 執行 (對應 UTC 16:05)
    - cron: "5 16 * * *"
  workflow_dispatch: # 允許手動執行

jobs:
  update-gantt:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: 🚀 執行甘特圖推進腳本 (並記錄日誌)
        id: run_script
        env:
          CONF_URL: ${{ secrets.CONF_URL }}
          CONF_USER: ${{ secrets.CONF_USER }}
          CONF_PASS: ${{ secrets.CONF_PASS }}
        # 使用 2>&1 | tee output.txt 同時在 Console 顯示並存在檔案中，供郵件讀取
        run: python github_gantt_sync.py 2>&1 | tee output.txt

      - name: 📧 發送執行成功信件
        if: success()
        uses: dawidd6/action-send-mail@v4  # 升級到 v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Confluence Gantt Sync [Success] - ${{ github.run_id }}" # 加入 run_id 避免被 Gmail 歸類為重複對話
          to: bb00lin@gmail.com
          from: "GitHub-Automation" # 建議用簡單字串，不要帶特殊符號
          body: file://output.txt

      - name: 📧 發送執行失敗信件
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Confluence Gantt Sync [Failed]
          to: bb00lin@gmail.com
          from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
          body: |
            甘特圖 Today 日期自動推進執行失敗。
            
            請檢查 GitHub Actions 執行結果或查看附件日誌。
            執行內容回報：
            file://output.txt
